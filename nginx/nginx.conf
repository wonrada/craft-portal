server {
    listen 80;
    server_name localhost;

    client_max_body_size 100M;

    # ── Backend API — Laravel via PHP-FPM ───────────────────────────────────
    # Matches /api/* and /sanctum/* — all routed through Laravel's index.php
    location ~ ^/(api|sanctum)(/|$) {
        fastcgi_pass            backend:9000;
        fastcgi_index           index.php;
        fastcgi_param           SCRIPT_FILENAME /var/www/public/index.php;
        fastcgi_param           QUERY_STRING    $query_string;
        fastcgi_param           REQUEST_METHOD  $request_method;
        fastcgi_param           CONTENT_TYPE    $content_type;
        fastcgi_param           CONTENT_LENGTH  $content_length;
        fastcgi_param           REQUEST_URI     $request_uri;
        fastcgi_param           SERVER_NAME     $server_name;
        fastcgi_param           SERVER_PORT     $server_port;
        fastcgi_param           SERVER_PROTOCOL $server_protocol;
        fastcgi_param           HTTPS           off;
        include                 fastcgi_params;
        fastcgi_read_timeout    120;
    }

    # ── Frontend — Vue / Vite dev server ────────────────────────────────────
    # Proxies everything else to the Vite dev server (incl. HMR WebSocket)
    location / {
        proxy_pass              http://frontend:5173;
        proxy_http_version      1.1;
        proxy_set_header        Upgrade           $http_upgrade;
        proxy_set_header        Connection        "upgrade";
        proxy_set_header        Host              $host;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
        proxy_cache_bypass      $http_upgrade;
        proxy_read_timeout      86400;
    }
}
